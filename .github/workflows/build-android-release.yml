name: Build Signed Release AAB

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Build unsigned release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release-key.jks

      - name: Sign the AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release-key.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -signedjar app-release-signed.aab \
            android/app/build/outputs/bundle/release/app-release.aab \
            "$KEY_ALIAS"

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: flare-hydra-release-signed-aab
          path: app-release-signed.aab
